name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.mod

      - name: Install tools
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v1.64.8

      - name: Format check
        run: |
          gofumpt -w .
          goimports -w .
          git diff --exit-code || { echo "::error::gofumpt/goimports changed files. Run 'make format' locally."; exit 1; }

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod || { echo "::error::go mod tidy changed files. Run 'make tidy' locally."; exit 1; }

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Build
        run: go build -trimpath -ldflags "-s -w" ./...

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: |
          npx biome format --write .
          git diff --exit-code || { echo "::error::biome format changed files. Run 'make format' locally."; exit 1; }

      - name: Lint
        run: npx oxlint .

      - name: Test
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Quality checks
        run: make quality
