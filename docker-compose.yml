services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hydra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-hydra}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 5

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    environment:
      DSN: postgres://${POSTGRES_USER:-hydra}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-hydra}?sslmode=disable
    command: migrate sql --yes
    depends_on:
      postgres:
        condition: service_healthy

  hydra:
    image: oryd/hydra:v2.2.0
    environment:
      DSN: postgres://${POSTGRES_USER:-hydra}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-hydra}?sslmode=disable
      URLS_SELF_ISSUER: http://localhost:4444
      URLS_CONSENT: http://localhost:8080/consent
      URLS_LOGIN: http://localhost:8080/login
      URLS_LOGOUT: http://localhost:8080/logout
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM:-a-very-secret-key-that-must-be-at-least-32-chars}
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "4444:4444"
      - "4445:4445"
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4444/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      HYDRA_ADMIN_URL: http://hydra:4445
      HYDRA_PUBLIC_URL: http://hydra:4444
    ports:
      - "8080:8080"
    depends_on:
      hydra:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
